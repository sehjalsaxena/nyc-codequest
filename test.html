<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    
    <script type="importmap">
    {
        "imports": {
            "@google/genai": "https://esm.run/@google/genai"
        }
    }
    </script>
</head>
<body>
    <main class="app-container">
        <header>
            <h1>NYC Contest Assistant</h1>
        </header>
        
        <!-- The output area takes up the middle space -->
        <div id="output" aria-live="polite"></div>
        
        <!-- The input area is anchored to the bottom -->
        <div class="input-group">
            <textarea id="prompt" rows="1" placeholder="Ask your question... (Press Enter to send)" aria-label="Input prompt"></textarea>
            <button id="sendBtn">Send</button>
        </div>
    </main>

    <script type="module" src="bot.js"></script>
</body>
</html>
